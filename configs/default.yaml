data:
  dureader_path: data/raw
  prepared_path: data/processed/prepared.json
  sample_size: 50
  corpus_size: 1000
  seed: 42
  min_answer_overlap: 0.0

retrieval:
  pipeline: bm25
  top_k: 5
  candidate_k: 25

reranker:
  model_name: BAAI/bge-reranker-v2-m3
  use_fp16: true

generator:
  model_path: ${GENERATOR_MODEL_PATH}
  max_new_tokens: 128
  temperature: 0.0
  device: auto
  repetition_penalty: 1.08
  no_repeat_ngram_size: 6

judge:
  base_url: https://www.dmxapi.cn/v1
  model: deepseek-v4-flash
  api_key: sk-afs7ei4Tgk9HJTuGTrGngD97H3K54e6V9it98O7NOmISqjrK

output:
  dir: results
